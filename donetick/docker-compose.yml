services:
  donetick:
    image: donetick/donetick
    container_name: donetick
    restart: unless-stopped
    volumes:
      - data:/donetick-data
      - ./config:/config
    environment:
      - DT_ENV=selfhosted
      - DT_SQLITE_PATH=/donetick-data/donetick.db
      - TZ=Europe/Berlin
    networks:
      - caddy

networks:
  caddy:
    name: caddy
    external: true

volumes:
  data:      