services:
  web:
    image: "ghcr.io/seanmorley15/adventurelog-frontend:latest"
    container_name: adventurelog-frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - server
    networks:
      - default
      - caddy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  server:
    image: "ghcr.io/seanmorley15/adventurelog-backend:latest"
    container_name: adventurelog-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - "/mnt/server/misc/adventure-log/media:/code/media/"
    networks:
      - default
      - caddy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000').read()"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s
  db:
    image: "postgis/postgis:16-3.5"
    container_name: adventurelog-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=database
      - POSTGRES_USER=adventure
      - POSTGRES_PASSWORD=changeme123
    volumes:
      - "db:/var/lib/postgresql/data"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'psql -U adventure -d database -c "SELECT ST_Buffer( ST_SetSRID(''POINT(0 0)''::GEOMETRY, 4326), 1) AS geom ;"',
        ]
      interval: 2s
      timeout: 1s
      retries: 5

networks:
  caddy:
    name: caddy
    external: true

volumes:
  db: