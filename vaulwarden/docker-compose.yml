services:
  vaultwarden:
    container_name: vaultwarden
    image: 'vaultwarden/server:latest'
    restart: unless-stopped
    ports:
      - '3003:80'
    environment:
      - 'DOMAIN=http://vaultwarden.home.lab'
      - 'SIGNUPS_ALLOWED=true'
    volumes:
      - 'vaultwarden-data:/data'
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://127.0.0.1:80'
      interval: 2s
      timeout: 10s
      retries: 15
    networks:
      - caddy
networks:
  caddy:
    external: true
    name: caddy
volumes:
  vaultwarden-data:
      external: true
      name: vaultwarden-data

