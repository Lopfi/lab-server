services:
  redis:
    image: 'redis:7.4'
    container_name: redis
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      timeout: 10s
      retries: 3
  paperless:
    image: 'paperlessngx/paperless-ngx:latest'
    container_name: paperless
    user: '3001:3001'
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - '3010:8000'
    volumes:
      - '/mnt/server/paperless/data:/usr/src/paperless/data'
      - '/mnt/server/paperless/media:/usr/src/paperless/media'
      - '/mnt/server/paperless/export:/usr/src/paperless/export'
      - '/mnt/server/paperless/consume:/usr/src/paperless/consume'
    environment:
      - PAPERLESS_URL=https://papers.rdorst.dev
      - 'PAPERLESS_ADMIN_PASSWORD=${SERVICE_PASSWORD_PAPERLESS}'
      - 'PAPERLESS_ADMIN_USER=${SERVICE_USER_PAPERLESS}'
      - 'PAPERLESS_REDIS=redis://redis:6379'
      - 'PAPERLESS_SECRET_KEY=${SERVICE_REALBASE64_64_PAPERLESS}'
    healthcheck:
      test:
        - CMD
        - curl
        - '-fs'
        - '-S'
        - '--max-time'
        - '2'
        - 'http://localhost:8000'
      interval: 30s
      timeout: 10s
      retries: 5

