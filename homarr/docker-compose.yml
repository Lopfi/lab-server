services:
  homarr:
    image: 'ghcr.io/homarr-labs/homarr:v1.40.0'
    container_name: homarr
    restart: unless-stopped
    ports:
      - '7575:7575'
    environment:
      - 'SECRET_ENCRYPTION_KEY=${SECRET_ENCRYPTION_KEY}'
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - '/mnt/server/homarr:/appdata'
    healthcheck:
      test:
        - CMD
        - wget
        - '-q'
        - '--spider'
        - 'http://127.0.0.1:7575'
      interval: 5s
      timeout: 20s
      retries: 10
    networks:
      - caddy
    labels:
      - "dockflare.enable=true"
      - "dockflare.hostname=dash.rdorst.dev"
      - "dockflare.service=http://homarr:7575"

networks:
  caddy:
    external: true
    name: caddy