services:
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - data:/app/data
      - /home/robin/lab-server/:/lab-server/
    networks:
      - caddy

networks:
  caddy:
    external: true
    name: caddy
volumes:
  data:
