services:
  caddy:
    container_name: caddy
    build: .
    image: caddy:custom
    env_file:
      - .env
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./conf:/etc/caddy
      - ./site:/srv
      - data:/data
      - config:/config
    networks:
      - caddy
networks:
  caddy:
    external: true
    name: caddy
volumes:
  data:
  config:
