version: "3.8"

services:
  minecraft:
    container_name: mc-litv3
    image: itzg/minecraft-server
    ports:
      - 25565:25565
    volumes:
      - mc:/data
    environment:
      EULA: "TRUE"
      TYPE: "CURSEFORGE"
      CF_SERVER_MOD: "https://minecraft.curseforge.com/projects/sevtech-ages/files/2570735/download"
      MEMORY: "10G"
      STOP_SERVER_ANNOUNCE_DELAY: "30"
      TZ: "Europe/Berlin"
      VERSION: "1.18.2"
volumes:
  mc:
    name: mc-litv3
    driver: local
    driver_opts:
      type: nfs
      o: nfsvers=4,addr=truenas,rw
      device: ":/mnt/store/nfs/docker-volumes/mc/life-in-the-village-3"
