version: "3.8"

services:
  minecraft:
    container_name: mc-raad2
    image: itzg/minecraft-server
    ports:
      - 25565:25565
    volumes:
      - mc:/data
    environment:
      EULA: "TRUE"
      TYPE: "AUTO_CURSEFORGE"
      CF_SLUG: "roguelike-adventures-and-dungeons-2"
      MEMORY: "6G"
      STOP_SERVER_ANNOUNCE_DELAY: "30"
      TZ: "Europe/Berlin"
volumes:
  mc:
    name: mc-raad2
    driver: local
    driver_opts:
      type: nfs
      o: nfsvers=4,addr=truenas,rw
      device: ":/mnt/store/nfs/docker-volumes/mc/roguelike-adventures-and-dungeons-2"
