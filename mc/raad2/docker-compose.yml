version: "3.8"

services:
  minecraft:
    container_name: mc-raad2
    image: itzg/minecraft-server:java11
    ports:
      - 25565:25565
    volumes:
      - mc:/data
    environment:
      EULA: "TRUE"
      TYPE: "CURSEFORGE"
      CF_SERVER_MOD: "RAD2-Serverpack-1.0a.zip"
      MEMORY: "10G"
      STOP_SERVER_ANNOUNCE_DELAY: "30"
      TZ: "Europe/Berlin"
      VERSION: "1.16.5"
volumes:
  mc:
    name: mc-raad2
    driver: local
    driver_opts:
      type: nfs
      o: nfsvers=4,addr=truenas,rw
      device: ":/mnt/store/nfs/docker-volumes/mc/roguelike-adventures-and-dungeons-2"
