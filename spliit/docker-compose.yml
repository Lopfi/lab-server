name: spliit
services:
  db:
    image: 'postgres:16.3-alpine'
    container_name: spliit-db
    volumes:
      - 'db:/var/lib/postgresql/data'
    environment:
      - TZ=Europe/Berlin
      - POSTGRES_DB=spliit
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    restart: unless-stopped
  spliit:
    image: 'crazymax/spliit:latest'
    container_name: spliit
    depends_on:
      - db
    environment:
      - TZ=Europe/Berlin
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=spliit
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    restart: unless-stopped
    ports:
      - '3001:3000'
    networks:
      - default
      - caddy

networks:
  caddy:
    name: caddy
    external: true

volumes:
  db: